---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: kde-streamer
description: Aurora-based KDE image for TV streaming and media playback.

base-image: ghcr.io/ublue-os/aurora
image-version: 42

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - tailscale

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.stremio.Stremio
          - io.bassi.Amberol
          - org.gnome.gThumb
